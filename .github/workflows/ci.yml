name: ci

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          uv venv .venv
          uv pip install --python .venv/bin/python -e ".[dev]"
      - name: Lint
        run: uv run --python .venv/bin/python --no-sync ruff check .
      - name: Typecheck
        run: uv run --python .venv/bin/python --no-sync mypy src
      - name: Test
        run: uv run --python .venv/bin/python --no-sync pytest

  package:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Build wheel
        run: |
          uv run python -m pip install build
          uv run python -m build
      - name: Build Docker image
        run: docker build -t yandex-tracker-mcp:ci .
